<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>Meu Fluxo de Caixa Inteligente</title>
    <style>
        /* DEFINIÇÃO DOS TEMAS */
        :root {
            --bg-body: #f1f5f9;
            --bg-container: #ffffff;
            --texto-principal: #0f172a;
            --texto-secundario: #64748b;
            --borda: #e2e8f0;
            --espessura-borda: 1px;
            --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
            --radius: 12px;
            --entrada: #10b981;
            --saida: #ef4444;
            --cartao: #f59e0b;
            --reserva-cor: #06b6d4;
            --azul-saldo: #3b82f6;
            --alerta-fundo: #fee2e2;
            --alerta-borda: #fca5a5;
            --bg-retratil: #f8fafc;
            --bg-rodape: rgba(255, 255, 255, 0.92);
            --header-bg: #2563eb;
            --header-txt: #ffffff;
            --saldo-box-bg: #ffffff;
        }

        body.theme-escuro {
            --bg-body: #0f172a;
            --bg-container: #1e293b;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --borda: #334155;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            --bg-retratil: #0f172a;
            --bg-rodape: rgba(30, 41, 59, 0.95);
            --header-bg: #1e293b;
            --header-txt: #3b82f6;
            --saldo-box-bg: #1e293b;
        }

        body.theme-pastel {
            --bg-body: #fdf6ec;
            --bg-container: #ffffff;
            --texto-principal: #4a3e3d;
            --texto-secundario: #a89a93;
            --borda: #f5eae4;
            --entrada: #a3b899;
            --saida: #eebbaf;
            --cartao: #f1e3a4;
            --reserva-cor: #b2d6df;
            --azul-saldo: #b2c9df;
            --header-bg: #eebbaf;
            --header-txt: #4a3e3d;
            --saldo-box-bg: #ffffff;
        }

        body.theme-retro {
            --bg-body: #fffae0;
            --bg-container: #fffdf5;
            --texto-principal: #2b2b2b;
            --texto-secundario: #706f68;
            --borda: #2b2b2b;
            --espessura-borda: 2px;
            --radius: 0px;
            --shadow: 4px 4px 0px #2b2b2b;
            --entrada: #49a078;
            --saida: #d64933;
            --cartao: #f3a712;
            --reserva-cor: #2a6f97;
            --header-bg: #2b2b2b;
            --header-txt: #fffae0;
            --saldo-box-bg: #fffdf5;
        }

        body.theme-whatsapp {
            --bg-body: #efeae2; 
            --bg-container: #ffffff; 
            --texto-principal: #111b21; 
            --texto-secundario: #667781;
            --borda: #e9edef;
            --espessura-borda: 1px;
            --shadow: 0 1px 3px rgba(11,20,26,0.08);
            --radius: 12px;
            --entrada: #00a884; 
            --saida: #ea0038;
            --cartao: #e1a200;
            --reserva-cor: #53bdeb;
            --azul-saldo: #3b82f6;
            --bg-retratil: #f0f2f5;
            --bg-rodape: rgba(240, 242, 245, 0.95);
            --header-bg: #008069; 
            --header-txt: #ffffff;
            --saldo-box-bg: #d9fdd3; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--texto-principal); 
            padding: 16px 16px 95px 16px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            transition: background-color 0.2s, color 0.2s;
        }
        
        .container { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column; 
            height: auto;
            position: relative;
        }
        
        .app-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            margin-bottom: 16px; 
            padding: 12px; 
            background: var(--header-bg); 
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: var(--espessura-borda) solid var(--borda);
        }
        .app-title { font-size: 1.3rem; font-weight: 700; color: var(--header-txt); letter-spacing: -0.5px; }
        .app-actions { display: flex; gap: 6px; align-items: center; }
        .icon-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--header-txt); display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; }

        .app-view { display: none; width: 100%; }
        .app-view.ativa { display: flex; flex-direction: column; }

        .cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .card { background: var(--bg-container); padding: 16px 8px; text-align: center; border-radius: var(--radius); border: var(--espessura-borda) solid var(--borda); box-shadow: var(--shadow); }
        .card h3 { font-size: 0.8rem; color: var(--texto-secundario); margin-bottom: 6px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .card p { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }
        
        .card.saldo-total { grid-column: span 3; padding: 24px; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; background: var(--saldo-box-bg); }
        .card.saldo-total h3 { font-size: 0.85rem; color: var(--texto-secundario); }
        .card.saldo-total p { font-size: 2.2rem; font-weight: 700; }
        
        .info-subtil-container { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; margin-top: 12px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 16px; }
        .linha-subtil-valores { display: flex; justify-content: center; gap: 16px; width: 100%; flex-wrap: wrap; }
        .previsao-texto, .reserva-texto { font-size: 0.85rem; color: var(--texto-secundario); font-weight: normal; display: inline-flex; align-items: center; gap: 4px; }
        .previsao-texto strong, .reserva-texto strong { font-weight: 700; color: var(--texto-principal); }
        .saldo-restante-texto { font-size: 0.95rem; color: var(--header-txt); font-weight: 700; margin-top: 6px; background: var(--header-bg); padding: 6px 14px; border-radius: 20px; box-shadow: var(--shadow); border: var(--espessura-borda) solid var(--borda); }
        .config-reserva-inline { cursor: pointer; font-size: 0.85rem; }
        
        .alerta-comprometido { background: var(--alerta-fundo); border: var(--espessura-borda) solid var(--alerta-borda); color: var(--texto-principal); padding: 8px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-top: 6px; width: 100%; text-align: center; display: none; }

        .cor-entrada { color: var(--entrada); }
        .cor-saida { color: var(--saida); }
        .cor-cartao { color: var(--cartao); }

        .filtros-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .filtro-select { flex: 1; padding: 12px 16px; border-radius: var(--radius); border: var(--espessura-borda) solid var(--borda); background: var(--bg-container); font-size: 0.9rem; color: var(--texto-principal); box-shadow: var(--shadow); outline: none; font-weight: 600; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; }

        .secao-conteudo { background: var(--bg-container); padding: 20px; border-radius: var(--radius); border: var(--espessura-borda) solid var(--borda); box-shadow: var(--shadow); margin-bottom: 20px; width: 100%; }
        
        .grafico-wrapper { margin-bottom: 8px; }
        .grafico-wrapper h4 { font-size: 0.9rem; color: var(--texto-principal); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .donut-chart { width: 140px; height: 140px; border-radius: 50%; margin: 12px auto; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; user-select: none; box-shadow: var(--shadow); }
        .donut-hole { width: 96px; height: 96px; background: var(--bg-container); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: var(--texto-secundario); text-align: center; }
        .donut-hole span:first-child { font-size: 1.2rem; font-weight: 700; color: var(--texto-principal); }
        .donut-legenda { display: flex; justify-content: center; gap: 16px; font-size: 0.85rem; font-weight: bold; margin-top: 14px; }
        
        .barra-horizontal-linha { margin-bottom: 14px; }
        .barra-horizontal-info { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
        .barra-horizontal-bg { background: var(--bg-retratil); height: 12px; width: 100%; border-radius: 6px; overflow: hidden; border: var(--espessura-borda) solid var(--borda); }
        .barra-horizontal-preenchimento { height: 100%; width: 0%; transition: width 0.5s ease; }
        
        .colunas-container { display: flex; justify-content: center; gap: 36px; height: 120px; align-items: flex-end; padding-top: 25px; margin-bottom: 20px; border-bottom: var(--espessura-borda) solid var(--borda); position: relative; }
        .coluna-vertical-bloco { display: flex; flex-direction: column; align-items: center; width: 65px; position: relative; }
        .coluna-vertical-barra { width: 28px; border-radius: 6px 6px 0 0; height: 2px; min-height: 2px; transition: height 0.5s ease; }
        .coluna-vertical-valor { font-size: 0.75rem; font-weight: 700; position: absolute; top: -20px; white-space: nowrap; text-align: center; }
        .coluna-vertical-rotulo { font-size: 0.8rem; font-weight: bold; position: absolute; bottom: -24px; color: var(--texto-secundario); }

        .item-transacao { display: flex; flex-direction: column; padding: 14px 4px; border-bottom: 1px solid var(--borda); cursor: pointer; }
        .item-transacao:last-child { border-bottom: none; }
        .linha-principal { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .detalhes-item { display: flex; flex-direction: column; gap: 6px; }
        .descricao-texto { font-size: 1rem; font-weight: 600; color: var(--texto-principal); }
        .tags-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .tipo-tag { font-size: 0.7rem; padding: 3px 8px; font-weight: 700; border-radius: 6px; text-transform: uppercase; }
        
        .tag-entrada { background: rgba(16, 185, 129, 0.1); color: var(--entrada); }
        .tag-saida { background: rgba(239, 68, 68, 0.1); color: var(--saida); }
        .tag-cartao { background: rgba(245, 158, 12b, 0.1); color: var(--cartao); }
        
        .tag-conta { background: var(--bg-retratil); color: var(--texto-secundario); font-size: 0.7rem; padding: 3px 8px; font-weight: 600; border-radius: 6px; border: var(--espessura-borda) solid var(--borda); }
        .tag-cartao-especifico { background: rgba(245, 158, 12b, 0.08); color: var(--cartao); font-size: 0.7rem; padding: 3px 8px; font-weight: 600; border-radius: 6px; }
        .tag-fixa { background: rgba(142, 36, 170, 0.1); color: #8e24aa; font-size: 0.7rem; padding: 3px 8px; font-weight: 600; border-radius: 6px; }
        .valor-historico { font-weight: 700; font-size: 1rem; letter-spacing: -0.5px; }

        .item-transacao.pendente { background: rgba(245, 158, 12b, 0.15); border-left: 4px solid var(--cartao); padding: 12px; border-radius: var(--radius); margin: 6px 0; }
        .container-pergunta { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.1); width: 100%; }
        .secao-pergunta-grupo { margin-bottom: 8px; }
        .texto-pergunta { font-size: 0.85rem; font-weight: 700; color: var(--texto-principal); margin-bottom: 6px; display: block; }
        .botoes-resposta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .btn-resposta { background: var(--bg-container); border: var(--espessura-borda) solid var(--borda); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--texto-principal); box-shadow: var(--shadow); }
        
        .chat-container-dinamico { margin-top: 20px; margin-bottom: 20px; width: 100%; }
        .chat-input-area { display: flex; gap: 8px; background: var(--bg-container); padding: 6px 6px 6px 16px; border-radius: 24px; border: var(--espessura-borda) solid var(--borda); align-items: center; position: relative; box-shadow: var(--shadow); }
        .chat-input { flex-grow: 1; border: none; padding: 8px 0; font-size: 1rem; outline: none; background: transparent; color: var(--texto-principal); }
        .chat-input::placeholder { color: var(--texto-secundario); }
        .btn-enviar { background: var(--header-bg); color: var(--header-txt); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; border: var(--espessura-borda) solid var(--borda); }
        
        .alerta-temporario { position: absolute; top: -54px; left: 50%; transform: translateX(-50%); background: #111b21; color: #ffffff; padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; white-space: nowrap; z-index: 10; box-shadow: var(--shadow); }
        .alerta-temporario.mostrar { opacity: 1; }

        .menu-rodape-wrapper { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px;
            background: var(--bg-rodape); padding: 10px 16px; border-top: var(--espessura-borda) solid var(--borda); z-index: 90; box-sizing: border-box; backdrop-filter: blur(8px);
        }
        .menu-rodape { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: transparent; border: none; color: var(--texto-secundario); padding: 6px 2px; cursor: pointer; font-size: 0.75rem; font-weight: 600; white-space: nowrap; transition: all 0.2s ease; }
        .tab-item span:first-child { font-size: 1.3rem; }
        .tab-item.ativo { color: var(--header-bg); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-container { background: var(--bg-container); width: 100%; max-width: 400px; border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; gap: 14px; box-shadow: var(--shadow); border: var(--espessura-borda) solid var(--borda); }
        .modal-title { font-size: 1.2rem; font-weight: 700; color: var(--texto-principal); border-bottom: var(--espessura-borda) solid var(--borda); padding-bottom: 8px; }
        .modal-label { font-size: 0.85rem; font-weight: bold; color: var(--texto-secundario); margin-bottom: -8px; }
        .modal-input, .modal-select { width: 100%; padding: 12px; border-radius: 8px; border: var(--espessura-borda) solid var(--borda); font-size: 1rem; background: var(--bg-body); color: var(--texto-principal); outline: none; }
        .modal-botoes { display: flex; gap: 8px; margin-top: 8px; }
        .btn-modal { flex: 1; padding: 12px; font-size: 0.95rem; font-weight: 600; border-radius: 20px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-salvar { background: var(--header-bg); color: var(--header-txt); border: var(--espessura-borda) solid var(--borda); }
        .btn-excluir { background: var(--saida); color: white; }
        .btn-cancelar { background: var(--bg-retratil); color: var(--texto-principal); border: var(--espessura-borda) solid var(--borda); }
        
        .config-btn-bloco { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: var(--radius); border: var(--espessura-borda) solid var(--borda); background: var(--bg-container); color: var(--texto-principal); font-weight: 600; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); }
    </style>
</head>
<body>

<div class="container">
    
    <!-- CABEÇALHO -->
    <div class="app-header">
        <div class="app-title" id="titulo-dinamico">Meu Saldo</div>

            <button class="icon-btn" onclick="alternarTema()" title="Mudar Estilo">🎨</button>
        </div>
    </div>

    <!-- TELA 1: INÍCIO -->

                        <div class="reserva-texto" id="card-reserva">

        </div>

        <div class="chat-container-dinamico">
            <div class="chat-input-area">
                <div id="alerta" class="alerta-temporario">Salvo com sucesso! 📁</div>
