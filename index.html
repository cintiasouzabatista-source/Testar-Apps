<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Combustível</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
    --muted: #64748b; --accent: #2563eb; --border: #e2e8f0;
    --warn: #f59e0b; --danger: #ef4444; --ok: #16a34a;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --card: #1e293b; --text: #e2e8f0;
    --muted: #94a3b8; --accent: #3b82f6; --border: #334155;
  }
  [data-theme="retro"] {
    --bg: #fdf6e3; --card: #fffdf5; --text: #5c3a21;
    --muted: #8b6f47; --accent: #d97706; --border: #e7d7b8;
    font-family: 'Courier New', monospace;
  }
  [data-theme="estrada"] {
    --bg: #0a0a0a; --card: #1a1a1a; --text: #facc15;
    --muted: #a3a3a3; --accent: #f97316; --border: #333;
    background-image: repeating-linear-gradient(45deg, #0a0a0a 0px, #0a0a0a 10px, #111 10px, #111 20px);
  }

    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body { background: var(--bg); color: var(--text); margin: 0; padding: 16px; transition: .3s; }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  
  .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
  .top-bar select { flex: 0 0 120px; background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px 10px; border-radius: 8px; font-size: 14px; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 0 0 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card-full { grid-column: 1 / -1; }
  
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between; min-height: 120px;
  }
  .card h2 { font-size: 11px; color: var(--muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: .5px; }
  .valor { font-size: 22px; font-weight: 700; }
  .card-full .valor { font-size: 28px; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 3px; flex-grow: 1; }
  .badge { align-self: flex-start; padding: 3px 7px; border-radius: 6px; font-size: 11px; margin-top: 6px; font-weight: 600; }
  .badge.warn { background: #fef3c7; color: #92400e; }
  .badge.danger { background: #fee2e2; color: #991b1b; }
  .badge.ok { background: #dcfce7; color: #166534; }
  [data-theme="dark"] .badge.warn { background: #451a03; color: #fbbf24; }
  [data-theme="dark"] .badge.danger { background: #450a0a; color: #f87171; }
  [data-theme="dark"] .badge.ok { background: #052e16; color: #4ade80; }

  button {
    background: var(--accent); color: #fff; border: none;
    padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  button.sec { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .card button.sec { margin-top: 8px; align-self: flex-start; padding: 6px 12px; font-size: 13px; }

  dialog {
    border: none; border-radius: 12px; padding: 20px;
    background: var(--card); color: var(--text); width: 90%; max-width: 420px; border: 1px solid var(--border);
  }
  input, select { width: 100%; padding: 9px; margin: 6px 0 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
  label { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Controle Combustível</h1>
  <select id="tema" onchange="trocarTema(this.value)">
    <option value="claro">Claro</option>
    <option value="dark">Dark</option>
    <option value="retro">Retro</option>
    <option value="estrada">Estrada</option>
  </select>
</div>

<div class="btn-row">
  <button class="sec" onclick="abrirModal('veiculo')">Veículo</button>
  <button class="sec" onclick="abrirModal('comb')">Combustível</button>
  <button class="sec" onclick="abrirModal('manut')">Manutenção</button>
</div>

<div class="grid">
  <!-- 1. KM RODADOS FULL -->
  <div class="card card-full">
    <div>
      <h2>KM RODADOS</h2>
      <div class="valor" id="kmPeriodo">0 km</div>
      <div class="sub" id="consumoMedio">Consumo: -- km/L</div>
    </div>
    <button class="sec" onclick="abrirModal('km')">Ajustar KM</button>
  </div>

  <!-- 2. ABASTECIMENTO -->
  <div class="card">
    <div>
      <h2>ABASTECIMENTO</h2>
      <div class="valor" id="ultAbastData">--/--/----</div>
      <div class="sub" id="ultAbastInfo">R$ 0,00</div>
    </div>
  </div>

  <!-- 3. PRÓX ABASTECIMENTO -->
  <div class="card">
    <div>
      <h2>PRÓX. ABASTECIMENTO</h2>
      <div class="valor" id="proxAbast">-- km</div>
      <div class="sub">Estimativa</div>
    </div>
  </div>

  <!-- 4. TROCA ÓLEO -->
  <div class="card">
    <div>
      <h2>TROCA ÓLEO</h2>
      <div class="valor" id="ultOleoData">--/--/----</div>
      <div class="sub" id="ultOleoKm">KM: -----</div>
    </div>
  </div>

  <!-- 5. PRÓX TROCA ÓLEO -->
  <div class="card">
    <div>
      <h2>PRÓX. TROCA ÓLEO</h2>
      <div class="valor" id="proxOleoFaltam">-- km</div>
      <div class="sub" id="proxOleoMeta">Meta: -- km</div>
    </div>
    <span class="badge" id="badgeOleo">--</span>
  </div>
</div>

<!-- MODAIS -->
<dialog id="modalVeiculo">
  <h3>Cadastrar Veículo</h3>
  <label>Nome</label><input id="vNome" placeholder="Gol">
  <label>Modelo</label><input id="vModelo" placeholder="1.0 MPI">
  <label>Ano</label><input type="number" id="vAno" placeholder="2018">
  <label>Data Aquisição</label><input type="date" id="vDataAquis">
  <label>KM Atual</label><input type="number" id="vKm">
  <label>Tamanho do Tanque L</label><input type="number" id="vTanque" value="50">
  <button onclick="salvarVeiculo()">Salvar</button>
  <button class="sec" onclick="fecharModal()">Cancelar</button>
</dialog>

<dialog id="modalKm">
  <h3>Ajustar KM Rodados</h3>
  <label>KM Atual do Veículo</label><input type="number" id="kmAjuste">
  <button onclick="salvarKm()">Salvar</button>
  <button class="sec" onclick="fecharModal()">Cancelar</button>
</dialog>

<dialog id="modalComb">
  <h3>Cadastrar Combustível</h3>
  <label>Data</label><input type="date" id="cData">
  <label>KM Atual</label><input type="number" id="cKm">
  <label>Litros</label><input type="number" step="0.01" id="cLitros">
  <label>Valor por Litro R$</label><input type="number" step="0.01" id="cValorLitro">
  <label>Valor Total R$</label><input type="number" step="0.01" id="cValorTotal" readonly>
  <label>Posto</label><input id="cPosto" placeholder="Ipiranga">
  <button onclick="salvarComb()">Salvar</button>
  <button class="sec" onclick="fecharModal()">Cancelar</button>
</dialog>

<dialog id="modalManut">
  <h3>Cadastrar Manutenção</h3>
  <label>Tipo</label>
  <select id="mTipo">
    <option value="oleo">Troca de Óleo</option>
    <option value="outro">Outra Manutenção</option>
  </select>
  <label>Data</label><input type="date" id="mData">
  <label>KM Atual</label><input type="number" id="mKm">
  <label>Próxima Troca em quantos KM?</label><input type="number" id="mProxIntervalo" placeholder="Ex: 1000">
  <label>Valor R$</label><input type="number" step="0.01" id="mValor">
  <label>Observação</label><input id="mObs" placeholder="Óleo 5W30">
  <button onclick="salvarManut()">Salvar</button>
  <button class="sec" onclick="fecharModal()">Cancelar</button>
</dialog>

<script>
let db = JSON.parse(localStorage.getItem('combDbV5')) || {
  veiculo: { nome: '', modelo: '', ano: '', dataAquis: '', kmAtual: 0, tanque: 50 },
  abastecimentos: [],
  manutencoes: [],
  proxTrocaOleoKmMeta: 0,
  tema: 'claro'
};

function salvarDB() {
  localStorage.setItem('combDbV5', JSON.stringify(db));
  atualizarTela();
}

function trocarTema(tema) {
  document.documentElement.setAttribute('data-theme', tema);
  db.tema = tema;
  salvarDB();
}

function atualizarTela() {
  document.documentElement.setAttribute('data-theme', db.tema);
  document.getElementById('tema').value = db.tema;

  document.getElementById('kmPeriodo').innerText = `${db.veiculo.kmAtual} km`;

  if (db.abastecimentos.length >= 2) {
    let ult = db.abastecimentos[db.abastecimentos.length - 1];
    let pen = db.abastecimentos[db.abastecimentos.length - 2];
    let kmRodados = ult.km - pen.km;
    let consumo = kmRodados / ult.litros;
    document.getElementById('consumoMedio').innerText = `Consumo: ${consumo.toFixed(2)} km/L`;
    let kmRestantes = Math.round(consumo * db.veiculo.tanque * 0.9);
    document.getElementById('proxAbast').innerText = `~${kmRestantes} km`;
  }

  let ultAbast = db.abastecimentos[db.abastecimentos.length - 1];
  if (ultAbast) {
    document.getElementById('ultAbastData').innerText = new Date(ultAbast.data).toLocaleDateString();
    let total = ultAbast.litros * ultAbast.valorLitro;
    document.getElementById('ultAbastInfo').innerText = `R$ ${total.toFixed(2)} - ${ultAbast.litros}L`;
  }

  let ultOleo = db.manutencoes.filter(m => m.tipo === 'oleo').pop();
  if (ultOleo) {
    document.getElementById('ultOleoData').innerText = new Date(ultOleo.data).toLocaleDateString();
    document.getElementById('ultOleoKm').innerText = `KM: ${ultOleo.km}`;
  }

  if (db.proxTrocaOleoKmMeta > 0) {
    let faltam = db.proxTrocaOleoKmMeta - db.veiculo.kmAtual;
    document.getElementById('proxOleoFaltam').innerText = `${faltam} km`;
    document.getElementById('proxOleoMeta').innerText = `Meta: ${db.proxTrocaOleoKmMeta} km`;
    let badge = document.getElementById('badgeOleo');
    if (faltam <= 0) badge.className = 'badge danger', badge.innerText = 'Atrasado';
    else if (faltam <= 500) badge.className = 'badge warn', badge.innerText = 'Atenção';
    else badge.className = 'badge ok', badge.innerText = 'OK';
  }
}

document.getElementById('cLitros').oninput = calcTotal;
document.getElementById('cValorLitro').oninput = calcTotal;
function calcTotal() {
  let l = +document.getElementById('cLitros').value || 0;
  let v = +document.getElementById('cValorLitro').value || 0;
  document.getElementById('cValorTotal').value = (l * v).toFixed(2);
}

function abrirModal(tipo) {
  document.getElementById('modal' + (tipo==='veiculo'?'Veiculo':tipo==='comb'?'Comb':tipo==='manut'?'Manut':'Km')).showModal();
  document.getElementById('cData').valueAsDate = new Date();
  document.getElementById('mData').valueAsDate = new Date();
  document.getElementById('cKm').value = db.veiculo.kmAtual;
  document.getElementById('mKm').value = db.veiculo.kmAtual;
  document.getElementById('kmAjuste').value = db.veiculo.kmAtual;
}
function fecharModal() { document.querySelectorAll('dialog').forEach(d => d.close()); }

function salvarVeiculo() {
  db.veiculo.nome = document.getElementById('vNome').value;
  db.veiculo.modelo = document.getElementById('vModelo').value;
  db.veiculo.ano = document.getElementById('vAno').value;
  db.veiculo.dataAquis = document.getElementById('vDataAquis').value;
  db.veiculo.kmAtual = +document.getElementById('vKm').value;
  db.veiculo.tanque = +document.getElementById('vTanque').value;
  salvarDB(); fecharModal();
}

function salvarKm() {
  db.veiculo.kmAtual = +document.getElementById('kmAjuste').value;
  salvarDB(); fecharModal();
}

function salvarComb() {
  db.abastecimentos.push({
    data: document.getElementById('cData').value,
    km: +document.getElementById('cKm').value,
    litros: +document.getElementById('cLitros').value,
    valorLitro: +document.getElementById('cValorLitro').value,
    posto: document.getElementById('cPosto').value
  });
  db.veiculo.kmAtual = +document.getElementById('cKm').value;
  salvarDB(); fecharModal();
}

function salvarManut() {
  let tipo = document.getElementById('mTipo').value;
  let kmAtual = +document.getElementById('mKm').value;
  let intervalo = +document.getElementById('mProxIntervalo').value;
  db.manutencoes.push({
    tipo: tipo, data: document.getElementById('mData').value, km: kmAtual,
    valor: +document.getElementById('mValor').value, obs: document.getElementById('mObs').value
  });
  if (tipo === 'oleo' && intervalo > 0) {
    db.proxTrocaOleoKmMeta = kmAtual + intervalo;
  }
  db.veiculo.kmAtual = kmAtual;
  salvarDB(); fecharModal();
}

atualizarTela();
</script>
</body>
</html>
