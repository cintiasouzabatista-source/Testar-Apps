<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Veículos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#2563eb;--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
body.estrada{--primary:#ea580c;--bg:#fff7ed}
body{background:var(--bg);color:var(--text);font-family:system-ui;margin:0}
header{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border)}
.tab{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.container{padding:16px;max-width:900px;margin:auto}
.card{background:var(--card);padding:16px;border-radius:12px;border:1px solid var(--border);margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-icon{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;gap:8px;align-items:center;justify-content:center}
.btn-destaque{background:linear-gradient(135deg,var(--primary),#1d4ed8);color:#fff;border:none;font-weight:700;box-shadow:0 4px 12px rgba(37,99,235,0.3)}
body.estrada.btn-destaque{background:linear-gradient(135deg,#ea580c,#c2410c);box-shadow:0 4px 12px rgba(234,88,12,0.3)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal-content{background:var(--card);padding:20px;border-radius:12px;width:100%;max-width:400px}
.modal-content label{font-size:12px;color:var(--muted);margin-top:8px;display:block}
.modal-content input,.modal-content select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-top:4px;box-sizing:border-box}
.item{display:flex;justify-content:space-between;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>
<header>
  <h2><i class="fas fa-car"></i> Meus Veículos</h2>
  <div><button onclick="alternarTema()"><i class="fas fa-palette"></i></button></div>
</header>

<div class="tabs">
  <button class="tab active" onclick="trocarView('painel')"><i class="fas fa-gauge"></i> Painel</button>
  <button class="tab" onclick="trocarView('historico')"><i class="fas fa-clock-rotate-left"></i> Histórico</button>
  <button class="tab" onclick="trocarView('graficos')"><i class="fas fa-chart-line"></i> Gráficos</button>
  <button class="tab" onclick="abrirModalNovoVeiculo()"><i class="fas fa-plus"></i> Novo Veículo</button>
</div>

<div class="container" id="view-painel">
  <div class="card"><h3 id="nomeVeiculoAtivo">Selecione um veículo</h3></div>
  <div class="grid-2" style="margin: 12px 0">
    <button class="btn-icon btn-destaque" onclick="abrirModalAbast()"><i class="fas fa-gas-pump"></i> Combustível</button>
    <button class="btn-icon btn-destaque" onclick="abrirModalManut()"><i class="fas fa-wrench"></i> Manutenção</button>
  </div>
  <div class="card"><h4>Últimos Abastecimentos</h4><div id="listaAbast"></div></div>
  <div class="card"><h4>Últimas Manutenções</h4><div id="listaManut"></div></div>
</div>

<div class="container" id="view-historico" style="display:none">
  <div class="card"><h3>Histórico Completo</h3><div id="listaHistorico"></div></div>
</div>

<div class="container" id="view-graficos" style="display:none">
  <div class="card"><h3>Consumo km/L por Mês</h3><canvas id="graficoConsumo"></canvas></div>
  <div class="card"><h3>Gastos por Combustível</h3><canvas id="graficoCombustivel"></canvas></div>
</div>

<div id="modalAbast" class="modal"><div class="modal-content">
  <h3>Novo Abastecimento</h3>
  <label>Data</label><input id="aData" type="date">
  <label>KM</label><input id="aKm" type="number">
  <label>Combustível</label><select id="aCombustivel"><option>Gasolina</option><option>Etanol</option><option>Diesel</option><option>GNV</option></select>
  <label>Litros</label><input id="aLitros" type="number" step="0.001">
  <label>Valor/L</label><input id="aValor" type="number" step="0.01">
  <button class="btn-icon btn-destaque" style="width:100%;margin-top:12px" onclick="salvarAbast()">Salvar</button>
  <button class="btn-icon" style="width:100%;margin-top:8px" onclick="fecharModalAbast()">Cancelar</button>
</div></div>

<div id="modalManut" class="modal"><div class="modal-content">
  <h3>Nova Manutenção</h3>
  <label>Data</label><input id="mData" type="date">
  <label>KM</label><input id="mKm" type="number">
  <label>Tipo</label><input id="mTipo" placeholder="Troca de Óleo">
  <label>Valor</label><input id="mValor" type="number" step="0.01">
  <label>Próx. KM</label><input id="mProxKm" type="number">
  <button class="btn-icon btn-destaque" style="width:100%;margin-top:12px" onclick="salvarManut()">Salvar</button>
  <button class="btn-icon" style="width:100%;margin-top:8px" onclick="fecharModalManut()">Cancelar</button>
</div></div>

<div id="modalNovoVeiculo" class="modal"><div class="modal-content">
  <h3>Novo Veículo</h3>
  <label>Nome</label><input id="vNome">
  <label>Modelo</label><input id="vModelo">
  <label>Ano</label><input id="vAno" type="number">
  <button class="btn-icon btn-destaque" style="width:100%;margin-top:12px" onclick="salvarNovoVeiculo()">Salvar</button>
  <button class="btn-icon" style="width:100%;margin-top:8px" onclick="fecharModalNovoVeiculo()">Cancelar</button>
</div></div>

<script>
let veiculos = JSON.parse(localStorage.getItem('veiculos_v2')||'[]');
let veiculoAtivoId = localStorage.getItem('veiculoAtivoId_v2');
let chartConsumo, chartComb;

function salvarTudo(){localStorage.setItem('veiculos_v2',JSON.stringify(veiculos));localStorage.setItem('veiculoAtivoId_v2',veiculoAtivoId)}
function getVeiculoAtivo(){return veiculos.find(v=>v.id===veiculoAtivoId)}

function trocarView(v){document.querySelectorAll('.container').forEach(c=>c.style.display='none');document.getElementById('view-'+v).style.display='block';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');if(v==='graficos')renderGraficos();if(v==='historico')renderHistorico()}

function abrirModalAbast(){document.getElementById('modalAbast').style.display='flex';document.getElementById('aData').value=new Date().toISOString().split('T')[0]}
function fecharModalAbast(){document.getElementById('modalAbast').style.display='none'}
function salvarAbast(){const v=getVeiculoAtivo();v.abast.push({id:Date.now(),data:aData.value,km:+aKm.value,combustivel:aCombustivel.value,litros:+aLitros.value,valorL:+aValor.value,total:+aLitros.value*+aValor.value});salvarTudo();fecharModalAbast();atualizarPainel()}

function abrirModalManut(){document.getElementById('modalManut').style.display='flex';document.getElementById('mData').value=new Date().toISOString().split('T')[0]}
function fecharModalManut(){document.getElementById('modalManut').style.display='none'}
function salvarManut(){const v=getVeiculoAtivo();v.manut.push({id:Date.now(),data:mData.value,km:+mKm.value,tipo:mTipo.value,valor:+mValor.value,proxKm:+mProxKm.value});salvarTudo();fecharModalManut();atualizarPainel()}

function abrirModalNovoVeiculo(){document.getElementById('modalNovoVeiculo').style.display='flex'}
function fecharModalNovoVeiculo(){document.getElementById('modalNovoVeiculo').style.display='none'}
function salvarNovoVeiculo(){veiculos.push({id:Date.now(),nome:vNome.value,modelo:vModelo.value,ano:vAno.value,abast:[],manut:[],config:{kmBase:0,dataBase:new Date().toISOString(),kmValor:50,diasSemana:[1,2,3,4,5,6,0]}});veiculoAtivoId=veiculos[veiculos.length-1].id;salvarTudo();fecharModalNovoVeiculo();atualizarPainel()}

function renderGraficos(){
    const v=getVeiculoAtivo();if(!v)return;
    const meses={};v.abast.forEach((a,i)=>{if(i===0)return;const mes=a.data.slice(0,7);const km=a.km-v.abast[i-1].km;const consumo=km/a.litros;if(!meses[mes])meses[mes]=[];meses[mes].push(consumo)});
    const labels=Object.keys(meses).map(m=>m.split('-').reverse().join('/'));
    const dados=Object.values(meses).map(arr=>arr.reduce((a,b)=>a+b,0)/arr.length);
    if(chartConsumo)chartConsumo.destroy();
    chartConsumo=new Chart(document.getElementById('graficoConsumo'),{type:'line',data:{labels,datasets:[{label:'km/L',data:dados,borderColor:'var(--primary)'}]}});

    const gastos={};v.abast.forEach(a=>{gastos[a.combustivel]=(gastos[a.combustivel]||0)+a.total});
    if(chartComb)chartComb.destroy();
    chartComb=new Chart(document.getElementById('graficoCombustivel'),{type:'pie',data:{labels:Object.keys(gastos),datasets:[{data:Object.values(gastos)}]}});
}

function renderHistorico(){const v=getVeiculoAtivo();let html='';v.abast.forEach(a=>html+=`<div class="item"><span>${a.data} - ${a.km}km - ${a.combustivel}</span><span>R$${a.total.toFixed(2)}</span></div>`);document.getElementById('listaHistorico').innerHTML=html||'Sem dados'}
function atualizarPainel(){const v=getVeiculoAtivo();if(!v)return;document.getElementById('nomeVeiculoAtivo').innerText=v.nome;let htmlA='';v.abast.slice(-3).reverse().forEach(a=>htmlA+=`<div class="item"><span>${a.data}</span><span>${a.km}km</span></div>`);document.getElementById('listaAbast').innerHTML=htmlA||'Sem dados'}

document.addEventListener('DOMContentLoaded',()=>{if(!veiculos.length){veiculos.push({id:'v1',nome:'Honda Lead',modelo:'110',ano:'2023',abast:[{id:1,data:'2026-06-30',km:94208,combustivel:'Gasolina',litros:3.58,valorL:6.07,total:21.76}],manut:[],config:{}});veiculoAtivoId='v1'}aplicarTema();atualizarPainel()});
function aplicarTema(){if(localStorage.getItem('tema')==='estrada')document.body.classList.add('estrada')}
function alternarTema(){document.body.classList.toggle('estrada');localStorage.setItem('tema',document.body.classList.contains('estrada')?'estrada':'default')}
</script>
</body>
</html>
