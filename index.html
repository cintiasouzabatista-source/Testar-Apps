<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Frota Pro</title>
    <style>
        :root { --azul: #2563eb; --bg: #f8fafc; --card: #ffffff; --txt: #1e293b; --vermelho: #ef4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--txt); padding: 20px; padding-bottom: 90px; }
        .container { max-width: 500px; margin: auto; }
        
        .header { background: var(--azul); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px; }
        
        .secao { background: white; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .secao-header { padding: 18px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; }
        .secao-content { padding: 20px; display: none; }
        .secao.aberta .secao-content { display: block; }
        
        .input, .select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--azul); color: white; font-weight: 700; cursor: pointer; }
        .btn-vermelho { background: var(--vermelho); }
        
        .menu { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #e2e8f0; }
        .tab { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 0.8rem; }
        .tab.ativo { color: var(--azul); font-weight: 700; }
        .view { display: none; }
        .view.ativa { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="view ativa" id="view-inicio">
        <div class="header">
            <div class="header-top"><span>Veículo Ativo</span><span id="km-display">KM: 0</span></div>
            <select id="select-veiculo" class="select" onchange="trocarVeiculo()"></select>
        </div>
    </div>

    <div class="view" id="view-veiculo">
        <h2>Gestão</h2>
        <!-- Cadastro -->
        <div class="secao" id="acc-veiculo">
            <div class="secao-header" onclick="toggle('acc-veiculo')">Cadastrar Veículo <span>▼</span></div>
            <div class="secao-content">
                <input id="v-marca" class="input" placeholder="Marca">
                <input id="v-modelo" class="input" placeholder="Modelo">
                <button class="btn" onclick="cadastrarVeiculo()">Salvar Veículo</button>
            </div>
        </div>
        <!-- Abastecimento -->
        <div class="secao" id="acc-abastecer">
            <div class="secao-header" onclick="toggle('acc-abastecer')">Abastecer <span>▼</span></div>
            <div class="secao-content">
                <input id="ab-km" class="input" type="number" placeholder="KM Atual">
                <input id="ab-valor" class="input" type="number" placeholder="Valor R$" oninput="calcular()">
                <input id="ab-litros" class="input" type="number" placeholder="Litros" oninput="calcular()">
                <input id="ab-total" class="input" placeholder="Total R$" readonly>
                <button class="btn" onclick="cadastrarAbastecimento()">Salvar Abastecimento</button>
            </div>
        </div>
        <!-- Manutenção -->
        <div class="secao" id="acc-manut">
            <div class="secao-header" onclick="toggle('acc-manut')">Manutenção <span>▼</span></div>
            <div class="secao-content">
                <input id="man-desc" class="input" placeholder="Descrição">
                <input id="man-valor" class="input" type="number" placeholder="Valor R$">
                <button class="btn" onclick="cadastrarManutencao()">Salvar Manutenção</button>
            </div>
        </div>
    </div>

    <div class="view" id="view-config">
        <h2>Config</h2>
        <button class="btn btn-vermelho" onclick="resetarApp()">Resetar App</button>
    </div>
</div>

<div class="menu">
    <button class="tab ativo" onclick="navegar('inicio', this)">Início</button>
    <button class="tab" onclick="navegar('veiculo', this)">Gestão</button>
    <button class="tab" onclick="navegar('config', this)">Config</button>
</div>

<script>
    const $ = id => document.getElementById(id);
    let veiculos = JSON.parse(localStorage.getItem('veiculos')) || [];
    
    function navegar(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('ativa'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
        $(`view-${id}`).classList.add('ativa');
        btn.classList.add('ativo');
    }

    const toggle = id => $(id).classList.toggle('aberta');

    function calcular() {
        let valor = parseFloat($('ab-valor').value) || 0;
        let litros = parseFloat($('ab-litros').value) || 0;
        $('ab-total').value = (valor * litros).toFixed(2);
    }

    function cadastrarVeiculo() {
        veiculos.push({id: Date.now(), marca: $('v-marca').value, modelo: $('v-modelo').value});
        localStorage.setItem('veiculos', JSON.stringify(veiculos));
        atualizarUI();
        alert('Veículo cadastrado!');
    }

    function cadastrarAbastecimento() {
        alert('Abastecimento salvo!');
    }

    function cadastrarManutencao() {
        alert('Manutenção salva!');
    }

    function resetarApp() { if(confirm('Limpar dados?')) { localStorage.clear(); location.reload(); } }

    function atualizarUI() {
        let sel = $('select-veiculo');
        sel.innerHTML = veiculos.map(v => `<option value="${v.id}">${v.marca} ${v.modelo}</option>`).join('');
    }

    window.onload = atualizarUI;
</script>
</body>
</html>
