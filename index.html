<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Frota</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --danger: #ef4444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui; background: var(--bg); color: var(--text); padding-bottom: 80px; }
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-icon { background: var(--card); border: 1px solid var(--border); padding: 10px 12px; border-radius: 10px; cursor: pointer; color: var(--text); font-weight: 600; }
input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 6px; }
.kpi p { color: var(--muted); font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.kpi h3 { font-size: 24px; font-weight: 700; }
.odometro { background: linear-gradient(135deg, #2563eb, #1d4ed8); border: none; color: #fff; }
.odometro p,.odometro small { color: rgba(255,255,255,0.8); }
.nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 50; }
.nav-btn { background: none; border: none; color: var(--muted); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 33%; }
.nav-btn.active { color: var(--primary); }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:100 }
.modal-content { background:var(--card); padding:20px; border-radius:16px; width:90%; max-width:400px }
.modal-actions { display:flex; gap:8px; margin-top:12px }
</style>
</head>
<body>
<div class="container">
    <div class="header"><h1>Controle Frota</h1></div>
    <select id="selectVeiculo" class="card" style="width:100%; padding:12px" onchange="trocarVeiculo(this.value)"></select>

    <div class="grid-2" style="margin: 12px 0">
        <button class="btn-icon" onclick="abrirModalAbast()"><i class="fas fa-gas-pump"></i> Combustível</button>
        <button class="btn-icon" onclick="abrirModalManut()"><i class="fas fa-wrench"></i> Manutenção</button>
    </div>

    <div class="card odometro kpi">
        <p><i class="fas fa-road"></i> KM ATUAL</p>
        <h3 id="kmRodados">0 km</h3>
        <small id="consumoMedia">Consumo: -- km/L</small><br>
        <button class="btn-icon" style="background:rgba(0,0,0,0.3); border:none; margin-top:8px" onclick="ajustarOdometro()"><i class="fas fa-sliders-h"></i> Ajustar KM</button>
    </div>

    <div class="grid-2">
        <div class="card kpi"><p><i class="fas fa-gas-pump"></i> ABASTECIMENTO</p><h3 id="ultimoAbastData">--/--</h3><small id="ultimoAbastValor">R$ 0</small></div>
        <div class="card kpi"><p><i class="fas fa-calculator"></i> PRÓX. ABAST.</p><h3 id="proxAbastKm">-- km</h3><small>Estimativa</small></div>
    </div>
    <div class="grid-2">
        <div class="card kpi"><p><i class="fas fa-oil-can"></i> TROCA ÓLEO</p><h3 id="ultimaTrocaData">--/--</h3><small id="ultimaTrocaKm">KM: -----</small></div>
        <div class="card kpi"><p><i class="fas fa-bell"></i> PRÓX. TROCA</p><h3 id="proxTrocaKm">-- km</h3><small id="proxTrocaFaltam">Faltam -- km</small></div>
    </div>
</div>

<nav class="nav-bottom">
    <button class="nav-btn active"><i class="fas fa-home"></i> Início</button>
    <button class="nav-btn" onclick="abrirModalHistorico()"><i class="fas fa-list"></i> Histórico</button>
    <button class="nav-btn" onclick="abrirModalVeiculo()"><i class="fas fa-plus-circle"></i> Veículo</button>
</nav>

<!-- MODAIS -->
<div id="modalVeiculo" class="modal"><div class="modal-content"><h3><i class="fas fa-motorcycle"></i> Novo Veículo</h3><label>Nome</label><input id="vNome"><label>KM Atual</label><input id="vKm" type="number"><label>Tanque L</label><input id="vTanque" type="number" value="6.5"><label>KM/Dia</label><input id="vKmDia" type="number" value="50"><div class="modal-actions"><button onclick="fecharModalVeiculo()" class="btn-icon">Cancelar</button><button onclick="salvarVeiculo()" class="btn-icon" style="background:var(--primary); color:#fff">Salvar</button></div></div></div>
<div id="modalHistorico" class="modal"><div class="modal-content"><h3>Histórico</h3><div id="listaHistorico"></div><button onclick="fecharModalHistorico()" class="btn-icon" style="margin-top:12px">Fechar</button></div></div>
<div id="modalAbast" class="modal"><div class="modal-content"><h3>Novo Abastecimento</h3><label>Data</label><input id="aData" type="date"><label>KM</label><input id="aKm" type="number"><label>Litros</label><input id="aLitros" type="number" step="0.001"><label>Valor/L</label><input id="aValor" type="number" step="0.01"><div class="modal-actions"><button onclick="fecharModalAbast()" class="btn-icon">Cancelar</button><button onclick="salvarAbast()" class="btn-icon" style="background:var(--primary); color:#fff">Salvar</button></div></div></div>
<div id="modalManut" class="modal"><div class="modal-content"><h3>Nova Manutenção</h3><label>Data</label><input id="mData" type="date"><label>KM</label><input id="mKm" type="number"><label>Tipo</label><input id="mTipo"><label>Valor</label><input id="mValor" type="number"><label>Próx. em KM</label><input id="mProxKm" type="number" value="5000"><div class="modal-actions"><button onclick="fecharModalManut()" class="btn-icon">Cancelar</button><button onclick="salvarManut()" class="btn-icon" style="background:var(--primary); color:#fff">Salvar</button></div></div></div>

<script>
let veiculos = JSON.parse(localStorage.getItem('veiculos_frota_v8') || '[]');
let veiculoAtivoId = localStorage.getItem('veiculoAtivoId_frota_v8') || null;

function getVeiculoAtivo() { if(!veiculoAtivoId && veiculos.length) { veiculoAtivoId = veiculos[0].id; salvarTudo(); } return veiculos.find(v => v.id === veiculoAtivoId) || null; }
function salvarTudo() { localStorage.setItem('veiculos_frota_v8', JSON.stringify(veiculos)); localStorage.setItem('veiculoAtivoId_frota_v8', veiculoAtivoId); }

function calcularOdometroVirtual(v) { if(!v) return 0; const kmBase = v.config.kmBase || 0; const dataBase = new Date(v.config.dataBase); const kmDia = v.config.kmValor || 50; let kmTotal = kmBase; let dataCalc = new Date(dataBase); const agora = new Date(); while (dataCalc < agora) { dataCalc.setDate(dataCalc.getDate() + 1); if (v.config.diasSemana.includes(dataCalc.getDay())) kmTotal += kmDia; } return Math.floor(kmTotal); }

function atualizarPainel() {
    const v = getVeiculoAtivo(); if(!v) return; renderSelectVeiculo(); const kmVirtual = calcularOdometroVirtual(v);
    document.getElementById('kmRodados').textContent = kmVirtual.toLocaleString('pt-BR') + ' km';
    if(v.abast.length >= 2){
        let totalKm = 0, totalL = 0;
        for(let i = 1; i < v.abast.length; i++) { totalKm += v.abast[i].km - v.abast[i-1].km; totalL += v.abast[i].litros; }
        const media = totalL > 0? (totalKm / totalL) : 0;
        document.getElementById('consumoMedia').textContent = `Consumo: ${media.toFixed(2)} km/L`;
        const ultimoAbast = v.abast[v.abast.length - 1];
        document.getElementById('ultimoAbastData').textContent = new Date(ultimoAbast.data).toLocaleDateString('pt-BR');
        // AQUI MOSTRA VALOR/L TAMBEM
        document.getElementById('ultimoAbastValor').textContent = `R$ ${ultimoAbast.total.toFixed(2)} - ${ultimoAbast.litros}L - R$ ${ultimoAbast.valorL.toFixed(2)}/L`;

        const autonomia = Math.floor(media * v.tanqueL);
        const proxAbast = ultimoAbast.km + autonomia;
        document.getElementById('proxAbastKm').textContent = proxAbast.toLocaleString('pt-BR') + ' km';
    }
    const ultimaTroca = v.manut.filter(m => m.tipo.toLowerCase().includes('óleo')).pop();
    if(ultimaTroca){
        document.getElementById('ultimaTrocaData').textContent = new Date(ultimaTroca.data).toLocaleDateString('pt-BR');
        document.getElementById('ultimaTrocaKm').textContent = `KM: ${ultimaTroca.km.toLocaleString('pt-BR')}`;
        const proxTroca = ultimaTroca.km + (ultimaTroca.proxKm || 5000);
        document.getElementById('proxTrocaKm').textContent = proxTroca.toLocaleString('pt-BR') + ' km';
        document.getElementById('proxTrocaFaltam').textContent = `Faltam ${(proxTroca - kmVirtual).toLocaleString('pt-BR')} km`;
    }
    const hist = [...v.abast.map(a => ({...a, tipo:'abast'})),...v.manut.map(m => ({...m, tipo:'manut'}))].sort((a,b) => new Date(b.data) - new Date(a.data));
    document.getElementById('listaHistorico').innerHTML = hist.length? hist.map(h => `<div style="border-bottom:1px solid var(--border); padding:10px 0"><b>${h.tipo==='abast'?'Abastecimento':'Manutenção'}</b><br>${h.km.toLocaleString('pt-BR')} km - ${new Date(h.data).toLocaleDateString('pt-BR')} - R$${h.tipo==='abast'?h.total.toFixed(2):h.valor.toFixed(2)}</div>`).join('') : '<p>Nenhum registro</p>';
}
function renderSelectVeiculo() { const sel = document.getElementById('selectVeiculo'); sel.innerHTML = veiculos.map(v => `<option value="${v.id}" ${v.id===veiculoAtivoId?'selected':''}>${v.nome}</option>`).join(''); }
function trocarVeiculo(id) { veiculoAtivoId = id; salvarTudo(); atualizarPainel(); }

function abrirModalVeiculo(){ document.getElementById('modalVeiculo').style.display='flex'; }
function fecharModalVeiculo(){ document.getElementById('modalVeiculo').style.display='none'; }
function salvarVeiculo(){ const nome = document.getElementById('vNome').value; if(!nome) return alert('Digite um nome'); const id = 'v'+Date.now(); veiculos.push({id, nome, tanqueL: parseFloat(document.getElementById('vTanque').value) || 6.5, abast:[], manut:[], config:{ kmBase: parseInt(document.getElementById('vKm').value) || 0, dataBase: new Date().toISOString(), kmValor: parseInt(document.getElementById('vKmDia').value) || 50, diasSemana:[1,2,3,4,5,6,0] }}); veiculoAtivoId = id; salvarTudo(); fecharModalVeiculo(); atualizarPainel(); }

function ajustarOdometro() { const v = getVeiculoAtivo(); const km = prompt('Km real da moto agora?'); if(!km) return; v.config.kmBase = parseInt(km); v.config.dataBase = new Date().toISOString(); salvarTudo(); atualizarPainel(); }

function abrirModalAbast(){ document.getElementById('modalAbast').style.display='flex'; document.getElementById('aData').value=new Date().toISOString().slice(0,10); }
function fecharModalAbast(){ document.getElementById('modalAbast').style.display='none'; }
function salvarAbast(){ const v=getVeiculoAtivo(); const obj={id:'a'+Date.now(),data:document.getElementById('aData').value,km:+document.getElementById('aKm').value,litros:+document.getElementById('aLitros').value,valorL:+document.getElementById('aValor').value}; obj.total=obj.litros*obj.valorL; v.abast.push(obj); v.abast.sort((a,b)=>new Date(a.data)-new Date(b.data)); salvarTudo(); fecharModalAbast(); atualizarPainel(); }
function abrirModalManut(){ document.getElementById('modalManut').style.display='flex'; document.getElementById('mData').value=new Date().toISOString().slice(0,10); }
function fecharModalManut(){ document.getElementById('modalManut').style.display='none'; }
function salvarManut(){ const v=getVeiculoAtivo(); const obj={id:'m'+Date.now(),data:document.getElementById('mData').value,km:+document.getElementById('mKm').value,tipo:document.getElementById('mTipo').value,valor:+document.getElementById('mValor').value,proxKm:+document.getElementById('mProxKm').value}; v.manut.push(obj); salvarTudo(); fecharModalManut(); atualizarPainel(); }

function abrirModalHistorico(){ document.getElementById('modalHistorico').style.display='flex'; }
function fecharModalHistorico(){ document.getElementById('modalHistorico').style.display='none'; }

document.addEventListener('DOMContentLoaded', () => { if(!veiculos.length) { veiculos.push({id:'v1', nome:'Honda Lead', tanqueL:6.5, abast:[{id:'a1',data:'2026-06-30',km:94208,litros:3.58,valorL:6.079,total:21.76},{id:'a2',data:'2026-07-07',km:94367,litros:3.587,valorL:6.07,total:21.77}], manut:[{id:'m1',data:'2026-06-21',km:94014,tipo:'Troca Óleo',valor:75,proxKm:5000}], config:{kmBase:94367, dataBase:new Date().toISOString(), kmValor:50, diasSemana:[1,2,3,4,5,6,0]}}); veiculoAtivoId = 'v1'; } atualizarPainel(); });
</script>
</body>
</html>
